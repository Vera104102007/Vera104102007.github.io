<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моя первая страница</title>
    <style>
        /* Простые стили для наглядности */
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f0f0f0;
        }
        h1 {
            color: #333;
        }
        p {
            color: #666;
        }
        button {
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }
        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <!-- Основное содержание страницы -->
    <h1>Привет, мир!</h1>
    <p>Это моя первая HTML страница. Здесь может быть любой текст.</p>
    
    <p>Сегодня: <span id="date"></span></p>
    
    <button onclick="showMessage()">Нажми меня!</button>
    
    <script>
        // Простая функция для демонстрации работы JavaScript
        function showMessage() {
            alert('Привет! Это сообщение с кнопки.');
        }
        
        // Отображаем текущую дату
        document.getElementById('date').innerHTML = new Date().toLocaleDateString('ru-RU');
    </script>
</body>
</html>
